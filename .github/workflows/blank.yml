name: Create Evidence Issue on Milestone

on:
  milestone:
    types: [created]

jobs:
  create_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Evidence" \
            --body "This issue is linked to milestone: ${{ github.event.milestone.title }}" \
            --milestone "${{ github.event.milestone.number }}"
