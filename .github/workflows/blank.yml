name: Create Evidence Issue on Milestone

on:
  milestone:
    types: [created]

jobs:
  create_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Issue with Retries
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          M_TITLE: ${{ github.event.milestone.title }}
        run: |
          # Try to create the issue up to 5 times with a 10s sleep between attempts
          for i in {1..5}; do
            echo "Attempt $i: Creating issue for milestone '$M_TITLE'..."
            if gh issue create \
              --repo "$REPO" \
              --title "Document Milestone Success Criterias Evidences" \
              --body "Auto-generated for milestone: $M_TITLE" \
              --milestone "$M_TITLE"; then
              echo "Success!"
              exit 0
            fi
            echo "Milestone not found yet. Waiting 10 seconds..."
            sleep 10
          done
          echo "Failed after 5 attempts."
          exit 1
