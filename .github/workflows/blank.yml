name: Create Evidence Issue on Milestone

on:
  milestone:
    types: [created]

jobs:
  create_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for GitHub indexing
        run: sleep 10 # This gives GitHub a moment to recognize the new milestone

      - name: Create Issue and Assign to Milestone
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Evidence" \
            --body "Auto-generated issue for milestone: ${{ github.event.milestone.title }}" \
            --milestone "${{ github.event.milestone.number }}"
