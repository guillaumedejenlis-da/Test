name: Create Evidence Issue on Milestone

on:
  milestone:
    types: [created]

jobs:
  create_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Issue with Retries
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          M_TITLE: ${{ github.event.milestone.title }}
          M_DESC: ${{ github.event.milestone.description }}
        run: |
          # Use a placeholder if the description is empty
          ISSUE_BODY="${M_DESC:-No description provided for this milestone.}"

          for i in {1..5}; do
            echo "Attempt $i: Creating issue for milestone '$M_TITLE'..."
            if gh issue create \
              --repo "$REPO" \
              --title "Document Evidences for Milestone Success Criterias" \
              --body "$ISSUE_BODY" \
              --milestone "$M_TITLE"; then
              echo "Success!"
              exit 0
            fi
            echo "Waiting for GitHub indexing..."
            sleep 10
          done
          exit 1
