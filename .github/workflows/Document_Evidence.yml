name: Relocate Evidence on Issue Close

on:
  issues:
    types: [closed]

jobs:
  relocate_evidence:
    if: github.event.issue.title == 'Document Evidences for Milestone Success Criterias'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract and Post Evidence
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 1. Find the target link
          TARGET_URL=$(echo "$ISSUE_BODY" | grep -o 'https://github.com/[^ ]*' | grep -v "/milestone/" | head -n 1)
          
          if [ -z "$TARGET_URL" ]; then
            echo "Error: No target link found."
            exit 1
          fi

          # 2. Extract full multiline comment starting with Evidence
          # We use @base64 to ensure newlines and special characters aren't lost during extraction
          ENCODED_EVIDENCE=$(gh issue view "$ISSUE_NUMBER" --json comments --jq '.comments[] | select(.body | startswith("Evidence")) | .body' | head -n 1)

          if [ -z "$ENCODED_EVIDENCE" ]; then
            echo "Error: No comment starting with 'Evidence' found."
            exit 1
          fi

          # 3. Post the comment using a file to preserve exact formatting/images
          echo "$ENCODED_EVIDENCE" > evidence_tmp.md
          
          echo "Posting full evidence to $TARGET_URL..."
          gh issue comment "$TARGET_URL" --body-file evidence_tmp.md
